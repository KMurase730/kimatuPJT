<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>躰道の5つの操体</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>躰道の5つの操体</h1>
  </header>

  <main>
    <section class="intro">
      <h2>体軸操作の基礎</h2>
      <p>
        躰道では「体軸の変化」を駆使することで、攻撃・防御の幅が広がります。これを支える動きが「5つの操体」と呼ばれる体軸操作です。
      </p>
    </section>

    <section class="card-grid">
      <div class="card">
        <div class="card-title">旋（せん）</div>
        <div class="card-description">軸を中心に身体を回転させる動き。</div>
      </div>
      <div class="card">
        <div class="card-title">運（うん）</div>
        <div class="card-description">ステップや跳躍などの移動動作。</div>
      </div>
      <div class="card">
        <div class="card-title">変（へん）</div>
        <div class="card-description">高さを変えて攻防を行う動き（しゃがみ・跳びなど）。</div>
      </div>
      <div class="card">
        <div class="card-title">捻（ねん）</div>
        <div class="card-description">胴体を捻ってエネルギーを蓄積し、爆発的な技を出す動き。</div>
      </div>
      <div class="card">
        <div class="card-title">転（てん）</div>
        <div class="card-description">転がる・倒れることで連続動作や回避を実現する動き。</div>
      </div>
    </section>

    <section class="summary">
      <p>
        これらの操体を組み合わせることで、躰道独自の立体的で流動的な戦いが実現します。
      </p>
    </section>
  </main>

</body>
</html>
